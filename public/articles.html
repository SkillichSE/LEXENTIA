<!DOCTYPE html>
<html lang="en">
<head>
  <script>(function(){var t=localStorage.getItem("theme")||"dark";document.documentElement.setAttribute("data-theme",t);})();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article — Klyxe Lab</title>
  <link rel="icon" href="/media/L_logo.png" type="image/png">
  <meta name="description" content="Interactive article from Klyxe Lab">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/style-spacing.css">
  <link rel="stylesheet" href="/lab.css">
  <script src="/app.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <style>
    .lab-article-header { display: flex; gap: 24px; padding: 32px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 32px; align-items: flex-start; }
    .lab-article-num { font-family: var(--font-mono); font-size: 48px; font-weight: 700; color: var(--accent); line-height: 1; min-width: 60px; text-align: center; }
    .lab-article-meta { flex: 1; }
    .lab-article-tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .lab-article-title { font-size: 24px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; line-height: 1.3; }
    .lab-article-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
    .lab-article-body { max-width: 920px; margin: 32px 0 64px; }
    .lab-article.reveal { opacity: 0; transform: translateY(16px); transition: opacity 0.4s ease, transform 0.4s ease; }
    .lab-article.visible { opacity: 1; transform: translateY(0); }
    .lab-btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 16px; border: none; border-radius: 8px; background: var(--accent); color: #fff; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
    .lab-btn:hover { opacity: 0.88; }
    .lab-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .lab-btn-secondary { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text-primary); font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .lab-btn-secondary:hover { background: var(--accent-hover); border-color: var(--accent); }
    .lab-btn-secondary.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .status-msg { display: none; align-items: center; gap: 10px; padding: 12px 14px; border-radius: 8px; font-size: 0.875rem; line-height: 1.4; font-family: var(--font-mono); }
    .status-msg.ok { display: flex; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25); color: #34d399; }
    .status-msg.err { display: flex; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #f87171; }
    .pulse-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .api-key-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .api-key-input { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text-primary); font-size: 0.875rem; font-family: var(--font-mono); outline: none; transition: border-color 0.15s; }
    .api-key-input:focus { border-color: var(--accent); }
    .api-key-input::placeholder { color: var(--text-tertiary); }
    .vae-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .vae-panel { display: flex; flex-direction: column; }
    .vae-panel-title { font-size: 11px; font-family: var(--font-mono); color: var(--text-tertiary); margin-bottom: 8px; text-transform: uppercase; }
    .latent-sliders { display: flex; flex-direction: column; gap: 12px; }
    .latent-row { display: flex; align-items: center; gap: 12px; }
    .latent-label { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); min-width: 50px; }
    .latent-slider { flex: 1; height: 5px; border-radius: 2px; background: var(--bg); outline: none; -webkit-appearance: none; appearance: none; }
    .latent-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; }
    .latent-slider::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; border: none; }
    .w3d-placeholder { display: flex; align-items: center; justify-content: center; width: 100%; height: 340px; color: var(--text-tertiary); font-family: var(--font-mono); background: radial-gradient(ellipse at center, rgba(0,212,255,0.03) 0%, transparent 70%); border-radius: 8px; position: relative; }
    .word3d-word-tag { position: absolute; padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 11px; font-family: var(--font-mono); white-space: nowrap; pointer-events: none; background: rgba(15,23,42,0.7); backdrop-filter: blur(8px); }
    .temp-controls { display: flex; gap: 12px; margin-bottom: 16px; align-items: flex-end; }
    .temp-slider-wrap { flex: 1; }
    .temp-slider-label { display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-family: var(--font-mono); color: var(--text-secondary); margin-bottom: 6px; }
    #temp-slider { width: 100%; height: 5px; border-radius: 2px; background: var(--bg); outline: none; -webkit-appearance: none; appearance: none; }
    #temp-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; }
    #temp-slider::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; border: none; }
    .temp-prompt-input { width: 100%; min-height: 80px; padding: 12px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text-primary); font-size: 0.875rem; font-family: var(--font-mono); resize: vertical; outline: none; transition: border-color 0.15s; margin-bottom: 12px; box-sizing: border-box; }
    .temp-prompt-input:focus { border-color: var(--accent); }
    .temp-result-card { margin-bottom: 16px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .temp-result-head { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; background: var(--bg); border-bottom: 1px solid var(--border-subtle); }
    .temp-badge { font-family: var(--font-mono); font-size: 10px; padding: 3px 8px; border-radius: 4px; background: rgba(52,211,153,0.1); color: #34d399; border: 1px solid rgba(52,211,153,0.25); }
    .temp-result-text { padding: 14px; font-family: var(--font-mono); font-size: 0.875rem; color: var(--text-secondary); line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .tokens-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 16px 0; }
    .token-stat { text-align: center; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); }
    .token-stat-val { font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
    .token-stat-lbl { font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary); text-transform: uppercase; }
    .tokens-prompt-input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text-primary); font-size: 0.875rem; outline: none; transition: border-color 0.15s; margin-bottom: 12px; box-sizing: border-box; }
    .tokens-prompt-input:focus { border-color: var(--accent); }
    #tok-chart-wrap { height: 240px; margin: 16px 0; }
    .tokens-log { margin-top: 16px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .tokens-log-header { display: grid; grid-template-columns: 1fr 60px 60px 60px; gap: 12px; padding: 10px 12px; background: var(--bg); border-bottom: 1px solid var(--border-subtle); font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary); text-transform: uppercase; font-weight: 600; }
    .tokens-log-row { display: grid; grid-template-columns: 1fr 60px 60px 60px; gap: 12px; padding: 10px 12px; border-bottom: 1px solid var(--border-subtle); font-size: 0.8125rem; font-family: var(--font-mono); color: var(--text-secondary); align-items: center; }
    .tokens-log-row:last-child { border-bottom: none; }
    .tokens-log-row span:not(:first-child) { text-align: right; color: var(--accent); font-weight: 600; }
    .humaneval-models-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .model-chip { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text-secondary); font-size: 0.8125rem; font-family: var(--font-mono); cursor: pointer; transition: all 0.15s; }
    .model-chip:hover { background: var(--accent-hover); border-color: var(--accent); }
    .model-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .he-task-btn { padding: 8px 12px; font-size: 0.8125rem; }
    .he-problem { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 0.8125rem; color: var(--text-secondary); margin-bottom: 14px; overflow-x: auto; }
    .he-result-card { margin-bottom: 16px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .he-result-head { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; background: var(--bg); border-bottom: 1px solid var(--border-subtle); }
    .he-model-name { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); }
    .he-pass-badge { font-family: var(--font-mono); font-size: 10px; padding: 4px 8px; border-radius: 4px; font-weight: 600; border: 1px solid; }
    .he-pass-badge.running { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.25); color: #3b82f6; }
    .he-pass-badge.pass { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.25); color: #34d399; }
    .he-pass-badge.fail { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.25); color: #f87171; }
    .he-code { padding: 14px; font-family: var(--font-mono); font-size: 0.8125rem; color: var(--text-secondary); line-height: 1.5; white-space: pre-wrap; word-break: break-word; max-height: 300px; overflow-y: auto; }
    .param-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 0.8125rem; }
    .param-label { min-width: 20px; color: var(--text-tertiary); font-family: var(--font-mono); }
    .param-bar-wrap { flex: 1; height: 18px; background: var(--bg); border-radius: 3px; overflow: hidden; display: flex; align-items: center; }
    .param-bar { height: 100%; border-radius: 2px; transition: width 0.15s; }
    .param-val { min-width: 35px; text-align: right; color: var(--text-secondary); font-family: var(--font-mono); font-size: 0.75rem; }
    .mnist-prediction { font-size: 48px; font-weight: 700; color: var(--accent); text-align: center; margin-bottom: 4px; }
    .mnist-conf { font-size: 12px; color: var(--text-secondary); text-align: center; margin-bottom: 16px; font-family: var(--font-mono); }
    .mnist-canvas-wrap { position: relative; width: 100%; }
  </style>
</head>
